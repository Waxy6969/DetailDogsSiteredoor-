<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dev Tools | Detail Dogs LLC</title>
    <style>
        :root {
            --red: #ff1f4f;
            --blue: #1689ff;
            --bg: #050914;
            --panel: rgba(9, 17, 32, 0.9);
            --line: rgba(255, 255, 255, 0.14);
            --text: #fbfdff;
            --muted: #a9b6c8;
        }

        * { box-sizing: border-box; }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(255, 31, 79, 0.22), transparent 28rem),
                radial-gradient(circle at top right, rgba(22, 137, 255, 0.24), transparent 30rem),
                var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .dev-shell {
            display: grid;
            min-height: 100svh;
            grid-template-rows: auto 1fr;
        }

        [hidden] {
            display: none !important;
        }

        .dev-login {
            display: grid;
            min-height: 100svh;
            place-items: center;
            padding: 1rem;
        }

        .login-card {
            width: min(100%, 430px);
            border: 1px solid rgba(22, 137, 255, 0.42);
            background: rgba(5, 9, 20, 0.86);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), inset 0 0 0 1px rgba(255, 31, 79, 0.14);
            padding: 1.2rem;
            backdrop-filter: blur(16px);
        }

        .login-card h1 {
            margin: 0 0 0.45rem;
            font-size: 1.05rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .login-card p {
            margin: 0 0 1rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .admin-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
        }

        .admin-field {
            min-width: 0;
            min-height: 42px;
            border: 0;
            background: transparent;
            color: var(--text);
            font: 700 0.9rem Arial, Helvetica, sans-serif;
            padding: 0 0.8rem;
            outline: none;
        }

        .password-toggle,
        .admin-submit {
            min-height: 42px;
            border: 0;
            border-left: 1px solid var(--line);
            color: var(--text);
            cursor: pointer;
            font: 800 0.76rem Arial, Helvetica, sans-serif;
            padding: 0 0.8rem;
            text-transform: uppercase;
        }

        .password-toggle {
            background: rgba(255, 255, 255, 0.08);
        }

        .admin-submit {
            background: linear-gradient(135deg, var(--red), var(--blue));
        }

        .admin-message {
            min-height: 1rem;
            margin: 0.6rem 0 0;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.35;
        }

        .dev-bar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1rem;
            align-items: center;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--line);
            background: rgba(5, 9, 20, 0.92);
            backdrop-filter: blur(16px);
        }

        .dev-title {
            margin: 0;
            font-size: 0.92rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .dev-target {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            min-width: 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .dev-target input {
            width: 100%;
            min-height: 40px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            padding: 0 0.75rem;
            font: 700 0.88rem Arial, Helvetica, sans-serif;
            outline: none;
        }

        .dev-actions,
        .mode-switch {
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
        }

        button,
        .dev-link {
            min-height: 40px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
            cursor: pointer;
            font: 800 0.76rem Arial, Helvetica, sans-serif;
            padding: 0 0.85rem;
            text-decoration: none;
            text-transform: uppercase;
        }

        button.active {
            border-color: rgba(22, 137, 255, 0.86);
            background: linear-gradient(135deg, rgba(255, 31, 79, 0.34), rgba(22, 137, 255, 0.46));
            box-shadow: 0 0 18px rgba(22, 137, 255, 0.25);
        }

        .preview-zone {
            display: grid;
            place-items: center;
            min-height: 0;
            padding: 1rem;
        }

        .preview-frame-wrap {
            width: min(100%, 1440px);
            height: calc(100svh - 6rem);
            border: 1px solid rgba(22, 137, 255, 0.38);
            background: #02060d;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
            transition: width 180ms ease, height 180ms ease;
        }

        .preview-frame-wrap.mobile {
            width: 390px;
            max-width: 100%;
            height: min(844px, calc(100svh - 6rem));
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        @media (max-width: 800px) {
            .dev-bar {
                grid-template-columns: 1fr;
            }

            .dev-actions {
                justify-content: space-between;
            }

            .preview-zone {
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <section class="dev-login" id="devLogin" aria-labelledby="dev-login-title" hidden>
        <form class="login-card" id="devLoginForm" autocomplete="off">
            <h1 id="dev-login-title">Admin Dev Tools</h1>
            <p>Enter the admin password to unlock the development preview controls.</p>
            <div class="admin-row">
                <input class="admin-field" id="devPassword" name="password" type="password" placeholder="Admin password" aria-label="Admin password" required>
                <button class="password-toggle" id="devPasswordToggle" type="button" aria-label="Show password" aria-pressed="false">Show</button>
                <button class="admin-submit" type="submit">Unlock</button>
            </div>
            <p class="admin-message" id="devLoginMessage" aria-live="polite"></p>
        </form>
    </section>
    <main class="dev-shell" id="devShell" hidden>
        <header class="dev-bar">
            <h1 class="dev-title">Admin Dev Tools</h1>
            <label class="dev-target">
                <span class="sr-only">Preview path</span>
                <input id="targetPath" type="text" value="/" aria-label="Preview path">
            </label>
            <div class="dev-actions">
                <div class="mode-switch" aria-label="Preview mode">
                    <button id="webMode" type="button">Web</button>
                    <button id="mobileMode" type="button">Mobile</button>
                </div>
                <button id="refreshPreview" type="button">Refresh</button>
                <a class="dev-link" href="/">Exit</a>
            </div>
        </header>
        <section class="preview-zone" aria-label="Site preview">
            <div class="preview-frame-wrap" id="previewWrap">
                <iframe id="previewFrame" title="Detail Dogs site preview"></iframe>
            </div>
        </section>
    </main>
    <script>
        const adminCookieValue = 'erv_zbSXx48qypXLMjxQk_umzVdhmEYXJGgjsU50IUs';
        const passwordHash = '721cb45b28c58f3723983ab5873dac52627acbafc4706f252646d9a1b591bca2';
        const devLogin = document.getElementById('devLogin');
        const devShell = document.getElementById('devShell');
        const devLoginForm = document.getElementById('devLoginForm');
        const devPassword = document.getElementById('devPassword');
        const devPasswordToggle = document.getElementById('devPasswordToggle');
        const devLoginMessage = document.getElementById('devLoginMessage');
        const targetInput = document.getElementById('targetPath');
        const previewFrame = document.getElementById('previewFrame');
        const previewWrap = document.getElementById('previewWrap');
        const webMode = document.getElementById('webMode');
        const mobileMode = document.getElementById('mobileMode');
        const refreshPreview = document.getElementById('refreshPreview');
        const params = new URLSearchParams(window.location.search);

        function isAdmin() {
            return document.cookie.split(';').some((cookie) => {
                return cookie.trim() === `dd_admin=${adminCookieValue}`;
            });
        }

        async function sha256(value) {
            const bytes = new TextEncoder().encode(value);
            const digest = await crypto.subtle.digest('SHA-256', bytes);
            return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, '0')).join('');
        }

        function normalizePath(value) {
            if (!value || value.startsWith('/dev-tools')) return '/';
            if (value.startsWith('http')) {
                try {
                    const url = new URL(value);
                    return `${url.pathname}${url.search}${url.hash}` || '/';
                } catch (error) {
                    return '/';
                }
            }
            return value.startsWith('/') ? value : `/${value}`;
        }

        function setMode(mode) {
            const nextMode = mode === 'mobile' ? 'mobile' : 'web';
            previewWrap.classList.toggle('mobile', nextMode === 'mobile');
            webMode.classList.toggle('active', nextMode === 'web');
            mobileMode.classList.toggle('active', nextMode === 'mobile');
            localStorage.setItem('ddDevPreviewMode', nextMode);
        }

        function loadPreview() {
            const target = normalizePath(targetInput.value);
            targetInput.value = target;
            previewFrame.src = target;
        }

        function showLogin() {
            devLogin.hidden = false;
            devShell.hidden = true;
            devPassword.focus();
        }

        function showTools() {
            devLogin.hidden = true;
            devShell.hidden = false;
            targetInput.value = normalizePath(params.get('target') || '/');
            setMode(localStorage.getItem('ddDevPreviewMode') || 'web');
            loadPreview();
        }

        webMode.addEventListener('click', () => setMode('web'));
        mobileMode.addEventListener('click', () => setMode('mobile'));
        refreshPreview.addEventListener('click', loadPreview);
        targetInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') loadPreview();
        });

        devPasswordToggle.addEventListener('click', () => {
            const isVisible = devPassword.type === 'text';
            devPassword.type = isVisible ? 'password' : 'text';
            devPasswordToggle.textContent = isVisible ? 'Show' : 'Hide';
            devPasswordToggle.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
            devPasswordToggle.setAttribute('aria-pressed', String(!isVisible));
        });

        devLoginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            devLoginMessage.textContent = 'Checking password...';

            const hash = await sha256(devPassword.value);
            if (hash !== passwordHash) {
                devLoginMessage.textContent = 'Wrong password. Try again.';
                devPassword.select();
                return;
            }

            const secureFlag = window.location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `dd_admin=${adminCookieValue}; Path=/; Max-Age=86400; SameSite=Lax${secureFlag}`;
            devLoginMessage.textContent = 'Unlocked.';
            showTools();
        });

        if (isAdmin()) {
            showTools();
        } else {
            showLogin();
        }
    </script>
</body>
</html>
