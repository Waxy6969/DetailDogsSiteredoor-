<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Detail Dogs LLC | Site Under Construction</title>
    <meta name="description" content="Detail Dogs LLC is currently updating the website. Call or email to book service.">
    <style>
        :root {
            --poster-ratio: 1402 / 1122;
            --red: #ff1f4f;
            --blue: #1689ff;
            --text: #fbfdff;
            --muted: #c6d0dc;
        }

        * { box-sizing: border-box; }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100svh;
            background:
                linear-gradient(rgba(3, 8, 18, 0.12), rgba(3, 8, 18, 0.12)),
                url("images/assets/construction-poster.png") center / cover no-repeat;
            color: var(--text);
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -2rem;
            z-index: -1;
            background: inherit;
            filter: blur(18px) saturate(1.12);
            transform: scale(1.04);
        }

        .construction-stage {
            position: relative;
            width: calc(100svh * var(--poster-ratio));
            height: 100svh;
            aspect-ratio: var(--poster-ratio);
            overflow: hidden;
            background: transparent;
        }

        .construction-poster {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .hotspot {
            position: absolute;
            top: 78.2%;
            height: 9.6%;
            z-index: 3;
            border: 0;
            outline-offset: 4px;
            color: transparent;
            text-decoration: none;
        }

        .hotspot:focus-visible {
            outline: 2px solid var(--text);
        }

        .hotspot-call {
            left: 24.4%;
            width: 24.2%;
        }

        .hotspot-email {
            left: 51.3%;
            width: 24.4%;
        }

        .bottom-text-sheen {
            position: absolute;
            left: 8%;
            right: 8%;
            bottom: 2.2%;
            z-index: 1;
            height: 10.6%;
            overflow: hidden;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.95;
        }

        .bottom-text-sheen::before {
            content: "";
            position: absolute;
            top: 5%;
            bottom: 8%;
            left: -35%;
            right: -35%;
            background: linear-gradient(105deg,
                transparent 0%,
                rgba(255, 31, 79, 0) 39%,
                rgba(255, 31, 79, 0.34) 46%,
                rgba(255, 255, 255, 0.66) 50%,
                rgba(22, 137, 255, 0.4) 54%,
                rgba(22, 137, 255, 0) 61%,
                transparent 100%);
            filter: blur(0.5px);
            transform: translateX(-70%) skewX(-14deg);
            animation: bottomTextSheen 4.8s ease-in-out infinite;
        }

        .bottom-text-sheen::after {
            content: "";
            position: absolute;
            inset: 20% 0 8%;
            background:
                radial-gradient(circle at 17% 52%, rgba(255, 31, 79, 0.4), transparent 12%),
                radial-gradient(circle at 50% 52%, rgba(255, 255, 255, 0.22), transparent 14%),
                radial-gradient(circle at 82% 52%, rgba(22, 137, 255, 0.38), transparent 14%);
            animation: bottomTextPulse 2.8s ease-in-out infinite alternate;
        }

        @keyframes bottomTextSheen {
            0%,
            18% {
                transform: translateX(-78%) skewX(-14deg);
            }

            60%,
            100% {
                transform: translateX(78%) skewX(-14deg);
            }
        }

        @keyframes bottomTextPulse {
            from {
                opacity: 0.35;
            }

            to {
                opacity: 0.85;
            }
        }

        @media (max-aspect-ratio: 1402 / 1122) {
            .construction-stage {
                width: calc(100svh * var(--poster-ratio));
                height: 100svh;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .bottom-text-sheen::before,
            .bottom-text-sheen::after {
                animation: none;
            }
        }

        @media (max-width: 560px) {
            body {
                overflow: hidden;
                align-items: center;
            }

            .construction-stage {
                width: calc(100svh * var(--poster-ratio));
                height: 100svh;
            }

        }
    </style>
</head>
<body>
    <main class="construction-stage" aria-labelledby="construction-title">
        <img class="construction-poster" src="images/assets/construction-poster.png" alt="" aria-hidden="true">
        <div class="sr-only">
            <h1 id="construction-title">Site Under Construction</h1>
            <p>We are finishing up the new site. You can still call or email Detail Dogs LLC to book service or ask a question.</p>
        </div>
        <a class="hotspot hotspot-call" href="tel:+14849260606">Call Now</a>
        <a class="hotspot hotspot-email" href="mailto:detaildogsllc@gmail.com?subject=Detail%20Dogs%20Service%20Request">Email Us</a>
        <div class="bottom-text-sheen" aria-hidden="true"></div>
    </main>
</body>
</html>
