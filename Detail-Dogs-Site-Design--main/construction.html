<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Detail Dogs LLC | Site Under Construction</title>
    <meta name="description" content="Detail Dogs LLC is currently updating the website. Call or email to book service.">
    <style>
        :root {
            --bg: #050b16;
            --navy: #071426;
            --red: #ff1f4f;
            --blue: #006fe8;
            --teal: #18f0e4;
            --orange: #ff7a00;
            --text: #fbfdff;
            --muted: #c1d0dc;
            --line: rgba(24, 240, 228, 0.34);
        }

        * { box-sizing: border-box; }
        html, body { min-height: 100%; margin: 0; }

        body {
            display: grid;
            place-items: center;
            padding: clamp(1.1rem, 3vw, 3rem);
            background:
                radial-gradient(circle at 20% 24%, rgba(255, 31, 79, 0.23), transparent 30rem),
                radial-gradient(circle at 78% 24%, rgba(0, 111, 232, 0.36), transparent 36rem),
                radial-gradient(circle at 50% 2%, rgba(24, 240, 228, 0.14), transparent 24rem),
                linear-gradient(90deg, rgba(191, 9, 47, 0.38), transparent 46%, rgba(0, 111, 232, 0.38)),
                linear-gradient(180deg, var(--navy) 0%, var(--bg) 52%, var(--navy) 100%);
            color: var(--text);
            font-family: Impact, "Arial Black", Arial, Helvetica, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        .construction-card {
            width: min(1040px, 100%);
            padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 4vw, 3rem);
            background: transparent;
        }

        .logo-mark {
            display: block;
            width: min(420px, 78vw);
            margin: 0 auto clamp(1.2rem, 3vw, 2.2rem);
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.62)) drop-shadow(0 0 34px rgba(0, 111, 232, 0.38));
        }

        .status {
            position: relative;
            display: grid;
            gap: 0.05em;
            margin: 0 auto;
            width: min(860px, 100%);
            color: var(--text);
            font-size: clamp(3.2rem, 10vw, 7.1rem);
            font-style: italic;
            font-weight: 900;
            letter-spacing: 0;
            line-height: 0.86;
            text-transform: uppercase;
            text-shadow: 0 6px 0 rgba(0, 0, 0, 0.28), 0 18px 28px rgba(0, 0, 0, 0.34);
        }

        .status::before,
        .status::after {
            content: "";
            position: absolute;
            top: 25%;
            width: min(180px, 18vw);
            height: 2px;
        }

        .status::before {
            left: 0;
            background: linear-gradient(90deg, transparent, var(--red));
        }

        .status::after {
            right: 0;
            background: linear-gradient(90deg, var(--blue), transparent);
        }

        .status-blue {
            color: #147bff;
            text-shadow: 0 6px 0 rgba(0, 0, 0, 0.34), 0 0 28px rgba(0, 111, 232, 0.38);
        }

        .note {
            max-width: 48rem;
            margin: clamp(1.2rem, 3vw, 2rem) auto 0;
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            font-size: clamp(1.05rem, 2.3vw, 1.5rem);
            font-weight: 500;
            line-height: 1.55;
            text-shadow: 0 3px 16px rgba(0, 0, 0, 0.58);
        }

        .brand-pop {
            color: #1e90ff;
            font-weight: 800;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(0.9rem, 3vw, 1.5rem);
            justify-content: center;
            margin-top: clamp(1.4rem, 3vw, 2.2rem);
        }

        .action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            min-height: 70px;
            min-width: min(280px, 100%);
            padding: 0.9rem 1.4rem;
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: var(--text);
            font-size: clamp(1.35rem, 3vw, 2rem);
            font-weight: 800;
            line-height: 1.2;
            text-decoration: none;
            text-transform: uppercase;
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .action:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
        }

        .action svg {
            width: 1.35em;
            height: 1.35em;
            flex: 0 0 auto;
            fill: currentColor;
        }

        .action-primary {
            background: linear-gradient(135deg, rgba(255, 31, 79, 0.18), rgba(0, 111, 232, 0.14));
            border-color: var(--red);
        }

        .action-secondary {
            background: rgba(7, 20, 38, 0.58);
            border-color: var(--blue);
        }

        .admin-form {
            display: grid;
            gap: 0.7rem;
            width: min(390px, 100%);
            margin: clamp(1rem, 2vw, 1.5rem) auto 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .admin-row {
            display: grid;
            grid-template-columns: 1fr auto;
            border: 1px solid rgba(255, 255, 255, 0.24);
            background: rgba(3, 10, 20, 0.72);
            box-shadow: inset 0 0 0 1px rgba(24, 144, 255, 0.2);
        }

        .admin-field {
            min-width: 0;
            min-height: 46px;
            border: 0;
            background: transparent;
            color: var(--text);
            font: inherit;
            padding: 0.78rem 0.95rem;
            outline: none;
        }

        .admin-submit {
            min-height: 46px;
            border: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.18);
            background: linear-gradient(135deg, var(--red), var(--blue));
            color: var(--text);
            cursor: pointer;
            font: 800 0.86rem Arial, Helvetica, sans-serif;
            padding: 0 1rem;
            text-transform: uppercase;
        }

        .admin-message {
            min-height: 1.2rem;
            margin: 0;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.45;
        }

        @media (max-width: 520px) {
            body { padding: 1rem; }
            .construction-card { padding: 1rem 0; }
            .status::before,
            .status::after { display: none; }
            .actions { display: grid; }
            .action { min-height: 60px; }
            .admin-row { grid-template-columns: 1fr; }
            .admin-submit { border-left: 0; border-top: 1px solid rgba(255, 255, 255, 0.18); }
        }
    </style>
</head>

    <script>
        const adminForm = document.getElementById('admin-form');
        const adminPassword = document.getElementById('admin-password');
        const adminMessage = document.getElementById('admin-message');
        const passwordHash = '36b08fd2ca1e1b9d5dee1a705eaf7f5b42222e87db4c45a8698a45664763a667';
        const cookieValue = 'erv_zbSXx48qypXLMjxQk_umzVdhmEYXJGgjsU50IUs';

        async function sha256(value) {
            const bytes = new TextEncoder().encode(value);
            const digest = await crypto.subtle.digest('SHA-256', bytes);
            return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, '0')).join('');
        }

        function getNextPath() {
            const params = new URLSearchParams(window.location.search);
            return params.get('next') || '/';
        }

        adminForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            adminMessage.textContent = 'Checking password...';

            const hash = await sha256(adminPassword.value);
            if (hash !== passwordHash) {
                adminMessage.textContent = 'Wrong password. Try again.';
                adminPassword.select();
                return;
            }

            const secureFlag = window.location.protocol === 'https:' ? '; Secure' : '';
            document.cookie = `dd_admin=${cookieValue}; Path=/; Max-Age=86400; SameSite=Lax${secureFlag}`;
            adminMessage.textContent = 'Unlocked. Loading site...';
            window.location.href = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? '/site-preview.html'
                : getNextPath();
        });
    </script>
